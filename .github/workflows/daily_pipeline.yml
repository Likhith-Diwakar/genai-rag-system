name: Daily RAG Pipeline

on:
  schedule:
    - cron: "0 21 * * *"   # 3 AM IST timezone: 
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest

    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
      SQLITE_BACKUP_FOLDER_ID: ${{ secrets.SQLITE_BACKUP_FOLDER_ID }}
      QDRANT_BACKUP_FOLDER_ID: ${{ secrets.QDRANT_BACKUP_FOLDER_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install poppler (required for pdf2image)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install --upgrade --force-reinstall google-genai

      - name: Verify Gemini SDK
        run: |
          python - <<EOF
          from google import genai
          print("Google GenAI SDK loaded successfully")
          EOF

      - name: Run Daily Pipeline
        run: |
          python -u scripts/run_daily_sync.py
