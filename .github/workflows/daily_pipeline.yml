name: Daily RAG Pipeline

on:
  schedule:
    - cron: "0 21 * * *"   # 3 AM IST
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # CHECKOUT
      # --------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # --------------------------------------------------
      # PYTHON SETUP
      # --------------------------------------------------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # --------------------------------------------------
      # SYSTEM DEPENDENCIES
      # --------------------------------------------------
      - name: Install poppler (required for pdf2image)
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      # --------------------------------------------------
      # INSTALL DEPENDENCIES
      # --------------------------------------------------
      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # --------------------------------------------------
      # GOOGLE SERVICE ACCOUNT SETUP
      # --------------------------------------------------
      - name: Setup Google Credentials
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=credentials.json" >> $GITHUB_ENV

      # --------------------------------------------------
      # ENV VARIABLES (CRITICAL FIX)
      # --------------------------------------------------
      - name: Set environment variables
        run: |
          echo "QDRANT_URL=${{ secrets.QDRANT_URL }}" >> $GITHUB_ENV
          echo "QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}" >> $GITHUB_ENV
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> $GITHUB_ENV
          echo "HF_API_TOKEN=${{ secrets.HF_API_TOKEN }}" >> $GITHUB_ENV
          echo "SQLITE_FOLDER_ID=${{ secrets.SQLITE_FOLDER_ID }}" >> $GITHUB_ENV
          echo "QDRANT_FOLDER_ID=${{ secrets.QDRANT_FOLDER_ID }}" >> $GITHUB_ENV

      # --------------------------------------------------
      # RUN PIPELINE
      # --------------------------------------------------
      - name: Run Daily Pipeline
        run: |
          python -u scripts/run_daily_sync.py